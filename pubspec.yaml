name: flutter_devlog
description: A lightweight, extensible colored console logger for Flutter with structured log records, source location, JSON, levels, tags and scopes.
version: 0.2.0
homepage: https://github.com/bayajitislam/flutter_devlog
repository: https://github.com/bayajitislam/flutter_devlog
issue_tracker: https://github.com/bayajitislam/flutter_devlog/issues

topics:
  - logging
  - logger
  - debug
  - console

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
